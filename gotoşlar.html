<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVRENİN PARMAKLAYAN ÜÇLÜSÜ</title>

<style>
body {
    margin:0;
    padding:0;
    background:black;
    color:white;
    font-family: Impact, Arial Black, sans-serif;
    text-align:center;
    overflow:hidden;
}

h1 {
    margin-top:15vh;
    font-size:40px;
    opacity:0;
    animation:fadeIn 3s forwards;
}

button {
    margin:15px;
    padding:15px 30px;
    font-size:18px;
    border:none;
    cursor:pointer;
    border-radius:10px;
    transition:0.2s;
}

button:hover {
    transform:scale(1.1);
}

#boş {
    background:red;
    color:white;
}

#epic {
    background:purple;
    color:white;
}

#gercek {
    background:orange;
    color:black;
}

@keyframes fadeIn {
    to {opacity:1;}
}

.floating {
    position:absolute;
    font-size:20px;
    animation:fall linear infinite;
    color:lime;
}

@keyframes fall {
    0% {transform:translateY(-50px);}
    100% {transform:translateY(110vh);}
}

.bigText {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:50px;
    color:red;
    animation:boom 0.5s alternate infinite;
}

@keyframes boom {
    from {transform:translate(-50%,-50%) scale(1);}
    to {transform:translate(-50%,-50%) scale(1.2);}
}
</style>
</head>

<body>

<h1>
HAMZA – BUĞRA – MAİR <br>
PARMAKLAYAN TARZDAN İNSANLAR
</h1>

<br><br>

<button id="boş" onclick="bosMode()">💀 BOŞ YAP MODE</button>
<button id="epic" onclick="epicMode()">🔥 EPIC DOSTLUK TESTİ</button>
<button id="gercek" onclick="gercekMode()">🧨 GERÇEKLERİ AÇ</button>

<script>

// Arka planda random yazılar
const words = ["BOŞ YAPIYORUZ", "GUNDAKLAMA TARZI", "AYVAYIDA YEDİK Y*RRADA YEDİK", "SİSTEM ÇÖKTÜ", "LEGEND AMA BOŞ"];

setInterval(()=>{
    const span = document.createElement("span");
    span.className="floating";
    span.innerText = words[Math.floor(Math.random()*words.length)];
    span.style.left = Math.random()*100+"vw";
    span.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(span);

    setTimeout(()=>{span.remove()},5000);
},300);


// BOŞ MODE
function bosMode(){
    shakeScreen();
    showBigText("BOŞ YAPMA SEVİYESİ: TANRILAR ÜSTÜ");
}

// EPIC MODE
function epicMode(){
    const score = Math.floor(Math.random()*10000);
    showBigText("DOSTLUK GÜCÜ: "+score+"/10");
}

// GERÇEKLER
function gercekMode(){
    showBigText("Aslında hepimiz aynı odadayız.");
}

// Ekran titreme
function shakeScreen(){
    document.body.style.animation="shake 0.5s";
    setTimeout(()=>{document.body.style.animation=""},500);
}

const style = document.createElement("style");
style.innerHTML = `
@keyframes shake {
0%{transform:translate(2px,2px)}
25%{transform:translate(-2px,-2px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-2px,2px)}
100%{transform:translate(0,0)}
}`;
document.head.appendChild(style);

// Büyük yazı göster
function showBigText(text){
    const div = document.createElement("div");
    div.className="bigText";
    div.innerText=text;
    document.body.appendChild(div);

    setTimeout(()=>{div.remove()},2000);
}

</script>

</body>
</html>
