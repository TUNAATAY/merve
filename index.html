<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Merve Recovery Protocol | v2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&display=swap');

        body {
            margin: 0;
            background: radial-gradient(circle at center, #0a1428 0%, #02050a 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Arka plan toz zerrecikleri */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Ana Sahne */
        .stage {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: floating 6s ease-in-out infinite;
        }

        /* Fütüristik Geometrik Kalp Çizimi */
        .heart-svg {
            width: 250px;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.6));
        }

        /* Neon Mavi Hatlar */
        .heart-path {
            fill: none;
            stroke: #00f2ff;
            stroke-width: 1.5;
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            animation: draw 4s forwards, pulse 2s infinite 4s ease-in-out;
        }

        /* İç Katman Parlaması */
        .inner-heart {
            fill: rgba(0, 242, 255, 0.05);
            stroke: #00f2ff;
            stroke-width: 0.5;
            opacity: 0;
            animation: fadeIn 2s forwards 3s;
        }

        /* Mesaj Alanı */
        .text-container {
            margin-top: 30px;
            opacity: 0;
            animation: fadeIn 3s forwards 4s;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 5px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        p {
            font-weight: 200;
            font-size: 0.9rem;
            color: #8ab4f8;
            letter-spacing: 1px;
        }

        /* Animasyonlar */
        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.4); }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .flower-bits {
            position: absolute;
            fill: white;
            opacity: 0.3;
            animation: drift 10s infinite linear;
        }

        @keyframes drift {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="stars" id="starField"></div>

    <div class="stage">
        <svg viewBox="0 0 200 200" class="heart-svg">
            <path class="heart-path" d="M100,160 L80,140 C40,100 20,80 20,50 A30,30 0 0,1 80,20 L100,40 L120,20 A30,30 0 0,1 180,50 C180,80 160,100 120,140 Z M100,140 L110,130 M90,130 L100,140" />
            <path class="heart-path" d="M100,130 C70,100 40,80 40,55 A20,20 0 0,1 80,35 L100,55 L120,35 A20,20 0 0,1 160,55 C160,80 130,100 100,130" style="animation-delay: 1s;" />
            <path class="inner-heart" d="M100,160 L80,140 C40,100 20,80 20,50 A30,30 0 0,1 80,20 L100,40 L120,20 A30,30 0 0,1 180,50 C180,80 160,100 120,140 Z" />
        </svg>

        <div class="text-container">
            <h1>Mavinin Huzuru</h1>
            <p>Sadece dinlenmene bak pampa, her şey kontrol altında.</p>
        </div>
    </div>

    <script>
        // Arka plandaki yavaş süzülen çiçek/toz zerrecikleri
        const field = document.getElementById('starField');
        for (let i = 0; i < 40; i++) {
            let star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.background = 'white';
            star.style.borderRadius = '50%';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.opacity = Math.random();
            star.style.boxShadow = '0 0 5px white';
            field.appendChild(star);
        }
    </script>
</body>
</html>
