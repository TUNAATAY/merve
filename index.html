<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merve Recovery Protocol</title>
    <style>
        /* Klas bir font çekiyoruz */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Göz yormayan Derin Okyanus Mavisi (Merve'nin sevdiği ton) */
            background: radial-gradient(circle at center, #1a365d 0%, #0a192f 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: #e2e8f0;
        }

        /* Çiçeğin nabız gibi atması için taşıyıcı kutu */
        .flower-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: breath 4s ease-in-out infinite;
        }

        /* Kendi etrafında yavaşça dönme animasyonu */
        .flower {
            position: relative;
            width: 100%;
            height: 100%;
            animation: spin 40s linear infinite;
        }

        /* Profesyonel, cam efekti verilmiş yapraklar */
        .petal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 35px;
            height: 110px;
            background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(180,215,255,0.2) 100%);
            border-radius: 50px 50px 0 0;
            transform-origin: bottom center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* Matematiksel olarak kusursuz Altın Oran dizilimi */
        .petal:nth-child(1) { transform: translate(-50%, -100%) rotate(0deg); }
        .petal:nth-child(2) { transform: translate(-50%, -100%) rotate(45deg); }
        .petal:nth-child(3) { transform: translate(-50%, -100%) rotate(90deg); }
        .petal:nth-child(4) { transform: translate(-50%, -100%) rotate(135deg); }
        .petal:nth-child(5) { transform: translate(-50%, -100%) rotate(180deg); }
        .petal:nth-child(6) { transform: translate(-50%, -100%) rotate(225deg); }
        .petal:nth-child(7) { transform: translate(-50%, -100%) rotate(270deg); }
        .petal:nth-child(8) { transform: translate(-50%, -100%) rotate(315deg); }

        /* Çiçeğin altın sarısı parlayan merkezi */
        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45px;
            height: 45px;
            background: radial-gradient(circle, #fde047 0%, #d97706 100%);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.6);
            z-index: 10;
        }

        /* Karizmatik ve darlamayan mesaj paneli */
        .message-box {
            margin-top: 60px;
            text-align: center;
            opacity: 0;
            /* Yazı site açıldıktan 1 saniye sonra yavaşça belirir */
            animation: fadeIn 3s forwards 1s; 
        }

        .message-box h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .message-box p {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: #cbd5e1;
        }

        /* --- Animasyon Tanımlamaları --- */
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes breath {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); } /* Kalp atışı gibi hafifçe büyür */
        }

        @keyframes fadeIn {
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="flower-container">
        <div class="flower">
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
        </div>
        <div class="center"></div>
    </div>

    <div class="message-box">
        <h1>Mavinin Huzuru Seninle Olsun</h1>
        <p>Şu an her şey yolunda, sadece dinlenmene bak...</p>
    </div>

</body>
</html>
