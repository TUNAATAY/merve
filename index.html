<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Protocol: Active</title>
    <style>
        /* Fütüristik ve ince fontlar */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;1,300&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Derin Gece Mavisi Karanlık Arka Plan */
            background-color: #030811;
            background-image: radial-gradient(circle at bottom, #0d2240 0%, #02050a 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Uçuşan Mavi Toz Zerrecikleri (Particles) Alanı */
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            bottom: -10px;
            background: #00f2ff;
            border-radius: 50%;
            filter: drop-shadow(0 0 6px #00f2ff);
            opacity: 0;
            animation: floatUp linear infinite;
        }

        /* Ana Sahne Konteyneri */
        .scene {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Neon Bitki ve Kalp SVG'si */
        .neon-plant {
            width: 320px;
            height: 400px;
            overflow: visible;
            /* Hafif rüzgar sallantısı */
            animation: sway 6s ease-in-out infinite;
        }

        /* Bitki Gövdesi ve Yaprakları (Cyan Glow) */
        .stem {
            fill: none;
            stroke: #00f2ff;
            stroke-width: 3;
            stroke-linecap: round;
            filter: drop-shadow(0 0 10px #00f2ff);
        }

        .leaf {
            fill: rgba(0, 242, 255, 0.1);
            stroke: #00f2ff;
            stroke-width: 2;
            filter: drop-shadow(0 0 8px #00f2ff);
        }

        /* Neon Kalp (Pink/Magenta Glow) */
        .heart-group {
            transform-origin: 150px 150px;
            animation: heartbeat 1.5s infinite ease-in-out;
        }

        .heart-line {
            fill: none;
            stroke: #ff007f;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 15px #ff007f);
        }

        .heart-inner {
            fill: none;
            stroke: rgba(255, 0, 127, 0.6);
            stroke-width: 1.5;
            filter: drop-shadow(0 0 5px #ff007f);
        }

        /* Klas Mesaj Paneli */
        .message-box {
            text-align: center;
            color: #ffffff;
            margin-top: -10px;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
            opacity: 0;
            animation: fadeInText 3s forwards 1.5s;
        }

        .pov-title {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .subtext {
            font-size: 0.95rem;
            font-weight: 300;
            color: #8ab4f8;
            letter-spacing: 1px;
            font-style: italic;
        }

        /* --- Animasyonlar --- */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.06); filter: brightness(1.3); }
        }

        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(2deg); }
        }

        @keyframes fadeInText {
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="scene">
        <svg viewBox="0 0 300 400" class="neon-plant">
            <path d="M150,400 Q140,250 150,150" class="stem" />
            
            <path d="M148,320 Q90,300 80,340 Q120,350 148,330" class="leaf" />
            <path d="M151,260 Q210,240 220,280 Q180,290 151,270" class="leaf" />
            <path d="M149,200 Q100,170 90,210 Q120,225 149,210" class="leaf" />

            <g class="heart-group">
                <path d="M150,150 C150,150 100,110 100,80 A25,25 0 0,1 150,60 A25,25 0 0,1 200,80 C200,110 150,150 150,150 Z" class="heart-line" />
                <path d="M150,135 C150,135 115,100 115,80 A18,18 0 0,1 150,65 A18,18 0 0,1 185,80 C185,100 150,135 150,135 Z" class="heart-inner" />
            </g>
        </svg>

        <div class="message-box">
            <div class="pov-title">POV: You Can't Afford Flowers</div>
            <div class="subtext">Şu an her şey yolunda, sadece dinlenmene bak...</div>
        </div>
    </div>

    <script>
        const particleContainer = document.getElementById('particles');
        const particleCount = 35; // Ekranda aynı anda uçuşan toz sayısı

        for (let i = 0; i < particleCount; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            // Rastgele yatay pozisyon
            p.style.left = Math.random() * 100 + 'vw';
            // Rastgele uçuş süresi (7 ile 14 saniye arası)
            p.style.animationDuration = (Math.random() * 7 + 7) + 's';
            // Rastgele başlama gecikmesi
            p.style.animationDelay = (Math.random() * 5) + 's';
            // Rastgele boyut (2px ile 5px arası)
            let size = Math.random() * 3 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            
            particleContainer.appendChild(p);
        }
    </script>

</body>
</html>
