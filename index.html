<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Protocol: Merve_DeepBlue_v4</title>
    <style>
        /* HALVIOR OS - PROJECT: BLUE ZEN
           DESIGN: ULTRA BLUE / NEON CYAN
        */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500&display=swap');

        :root {
            --deep-blue: #020b16;
            --ocean-blue: #051c33;
            --neon-cyan: #00f2ff;
            --glow-blue: rgba(0, 242, 255, 0.4);
            --heart-color: #00e5ff; /* Kalbi de mavi/cyan tonuna çektik */
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--deep-blue);
            background-image: radial-gradient(circle at center, var(--ocean-blue) 0%, var(--deep-blue) 100%);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            color: white;
        }

        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        /* --- 1. LOADING EKRANI --- */
        #loadingScreen {
            position: fixed;
            inset: 0;
            background: var(--deep-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .loader-heart {
            width: 100px;
            height: 100px;
            fill: var(--neon-cyan);
            filter: drop-shadow(0 0 15px var(--neon-cyan));
            animation: pulse 0.8s infinite alternate;
        }

        /* --- 2. ANA İÇERİK --- */
        #mainContent {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            z-index: 10;
            transition: opacity 2s ease;
        }

        /* Merkezi Kalpli Çiçek */
        .flower-container {
            position: relative;
            width: 400px;
            height: 500px;
            animation: sway 5s ease-in-out infinite;
        }

        .flower-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .stem {
            fill: none;
            stroke: var(--neon-cyan);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        .leaf {
            fill: rgba(0, 242, 255, 0.1);
            stroke: var(--neon-cyan);
            stroke-width: 2;
            opacity: 0;
        }

        /* KALBİ BURAYA SABİTLEDİK - ASLA KAYBOLMAZ */
        .main-heart {
            fill: none;
            stroke: var(--heart-color);
            stroke-width: 5;
            filter: drop-shadow(0 0 20px var(--heart-color));
            transform-origin: 200px 180px;
            animation: heartbeat 2s infinite ease-in-out;
        }

        /* Yer Tutucu Yazı Alanı */
        .message-box {
            margin-top: 20px;
            text-align: center;
            max-width: 500px;
        }

        .editable-text {
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: #8ab4f8;
            border: 1px dashed rgba(255,255,255,0.1);
            padding: 10px;
            cursor: text;
        }

        /* Dekoratif Çiçekler */
        .deco-flower {
            position: absolute;
            font-size: 20px;
            opacity: 0.3;
            filter: blur(1px);
            animation: float 10s infinite linear;
        }

        /* ANİMASYONLAR */
        @keyframes pulse { to { transform: scale(1.15); filter: brightness(1.3); } }
        @keyframes heartbeat { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.1); filter: brightness(1.5); } 
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-2deg) translateX(-5px); }
            50% { transform: rotate(2deg) translateX(5px); }
        }
        @keyframes float {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-100vh) rotate(360deg); }
        }
        .draw-anim { animation: draw 3s forwards ease-out; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        .fade-in { animation: fadeIn 2s forwards 2s; }
        @keyframes fadeIn { to { opacity: 1; } }

    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div id="loadingScreen">
        <svg class="loader-heart" viewBox="0 0 32 32">
            <path d="M16,28.221c-0.34,0-0.671-0.134-0.916-0.378c-0.244-0.244-12.084-12.084-12.084-17.843c0-4.66,3.791-8.451,8.451-8.451 c1.666,0,3.284,0.485,4.66,1.401c1.376-0.916,2.994-1.401,4.66-1.401c4.66,0,8.451,3.791,8.451,8.451 c0,5.759-11.84,17.599-12.084,17.843C16.671,28.087,16.34,28.221,16,28.221z"/>
        </svg>
        <p style="margin-top:20px; letter-spacing:3px;">SİSTEM YÜKLENİYOR...</p>
    </div>

    <div id="mainContent">
        <div class="flower-container">
            <svg class="flower-svg" viewBox="0 0 400 600">
                <path id="stemPath" class="stem" d="M200,600 C180,450 220,350 200,180" />
                
                <path class="leaf fade-in" d="M198,480 Q120,440 110,500 Q160,520 198,490" />
                <path class="leaf fade-in" d="M202,380 Q290,340 300,400 Q250,420 202,390" />
                
                <path class="main-heart fade-in" d="M200,180 C200,180 120,110 120,65 A40,40 0 0,1 200,30 A40,40 0 0,1 280,65 C280,110 200,180 200,180 Z" />
            </svg>
        </div>

        <div class="message-box fade-in">
            <div class="editable-text" contenteditable="true">
                BURAYA İSTEDİĞİN MESAJI YAZ PAŞAM (TIKLA VE DÜZENLE)
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function initParticles() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<70; i++) particles.push({
                x: Math.random() * w, y: Math.random() * h,
                s: Math.random() * 2, v: Math.random() * 0.4 + 0.1,
                o: Math.random()
            });
        }

        function drawParticles() {
            ctx.clearRect(0,0,w,h);
            particles.forEach(p => {
                p.y -= p.v; if(p.y < 0) p.y = h;
                ctx.fillStyle = `rgba(0, 242, 255, ${p.o})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('load', () => {
            initParticles();
            drawParticles();
            setTimeout(() => {
                document.getElementById('loadingScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loadingScreen').style.display = 'none';
                    document.getElementById('mainContent').style.opacity = '1';
                    document.getElementById('stemPath').classList.add('draw-anim');
                    spawnFlowers();
                }, 1000);
            }, 2500);
        });

        function spawnFlowers() {
            const symbols = ['🌸', '💠', '❄️', '✨'];
            for(let i=0; i<15; i++) {
                let f = document.createElement('div');
                f.className = 'deco-flower';
                f.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                f.style.left = Math.random() * 100 + 'vw';
                f.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(f);
            }
        }
        window.addEventListener('resize', initParticles);
    </script>
</body>
</html>
