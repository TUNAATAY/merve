<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Protocol: Merve_Final_Sequence</title>
    <style>
        /* CSS RESET & THEME */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #02050a;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Arka Plan Hareketli Tozlar */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        /* 1. LOADING EKRANI */
        #loadingScreen {
            position: fixed;
            inset: 0;
            background: #02050a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .loader-heart {
            width: 120px;
            height: 120px;
            fill: #ff007f;
            filter: drop-shadow(0 0 20px #ff007f);
            animation: pulse 1s infinite alternate;
        }

        .loading-text {
            margin-top: 20px;
            letter-spacing: 5px;
            font-size: 1.2rem;
            animation: flicker 1.5s infinite;
        }

        /* 2. ANA İÇERİK (ÇİÇEKLER VE KALPLİ ÇİÇEK) */
        #mainContent {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            z-index: 10;
            transition: opacity 2s ease;
        }

        /* Merkezi Kalpli Çiçek */
        .heart-flower-svg {
            width: 450px; /* Kalbi ve çiçeği büyüttük kral */
            height: 600px;
            filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.3));
        }

        .stem {
            fill: none;
            stroke: #00f2ff;
            stroke-width: 4;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        .leaf {
            fill: rgba(0, 242, 255, 0.2);
            stroke: #00f2ff;
            stroke-width: 2;
            opacity: 0;
        }

        .main-heart {
            fill: none;
            stroke: #ff007f;
            stroke-width: 5;
            filter: drop-shadow(0 0 25px #ff007f);
            transform-origin: center;
            opacity: 0;
        }

        /* Dekoratif Yan Çiçekler */
        .deco-flower {
            position: absolute;
            width: 100px;
            height: 100px;
            opacity: 0;
            transition: all 1s ease;
        }

        /* ANİMASYONLAR */
        @keyframes pulse { to { transform: scale(1.2); } }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .animate-draw { animation: draw 3s forwards ease-out; }
        .animate-fade { animation: fadeIn 2s forwards 2s; }
        .animate-heart { animation: heartIn 2s forwards 3s, pulse 1.5s infinite 5s ease-in-out; }

        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes heartIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div id="loadingScreen">
        <svg class="loader-heart" viewBox="0 0 32 32">
            <path d="M16,28.221c-0.34,0-0.671-0.134-0.916-0.378c-0.244-0.244-12.084-12.084-12.084-17.843c0-4.66,3.791-8.451,8.451-8.451 c1.666,0,3.284,0.485,4.66,1.401c1.376-0.916,2.994-1.401,4.66-1.401c4.66,0,8.451,3.791,8.451,8.451 c0,5.759-11.84,17.599-12.084,17.843C16.671,28.087,16.34,28.221,16,28.221z"/>
        </svg>
        <div class="loading-text">YÜKLENİYOR...</div>
    </div>

    <div id="mainContent">
        <svg class="heart-flower-svg" viewBox="0 0 400 600">
            <path id="stemPath" class="stem" d="M200,600 C180,450 220,350 200,180" />
            
            <path class="leaf animate-fade" d="M198,480 Q120,440 110,500 Q160,520 198,490" />
            <path class="leaf animate-fade" d="M202,380 Q290,340 300,400 Q250,420 202,390" />
            
            <g class="animate-heart">
                <path class="main-heart" d="M200,180 C200,180 120,110 120,65 A40,40 0 0,1 200,30 A40,40 0 0,1 280,65 C280,110 200,180 200,180 Z" />
                <path fill="none" stroke="rgba(255,0,127,0.3)" stroke-width="1" d="M200,180 L120,65 M200,180 L280,65 M200,30 L200,180" />
            </g>
        </svg>
    </div>

    <script>
        // 1. Toz Zerrecikleri Motoru
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function initParticles() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<80; i++) particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                s: Math.random() * 2,
                v: Math.random() * 0.5 + 0.2,
                o: Math.random()
            });
        }

        function drawParticles() {
            ctx.clearRect(0,0,w,h);
            particles.forEach(p => {
                p.y -= p.v;
                if(p.y < 0) p.y = h;
                ctx.fillStyle = `rgba(0, 242, 255, ${p.o})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        // 2. Yükleme ve Geçiş Mantığı
        window.addEventListener('load', () => {
            initParticles();
            drawParticles();

            // 3 saniye sonra loading bitsin
            setTimeout(() => {
                document.getElementById('loadingScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loadingScreen').style.display = 'none';
                    startMainSequence();
                }, 1000);
            }, 3000);
        });

        function startMainSequence() {
            const main = document.getElementById('mainContent');
            main.style.opacity = '1';
            
            // Sapı çizmeye başla
            document.getElementById('stemPath').classList.add('animate-draw');
            
            // Yanlara dekoratif çiçekler serpiştir
            for(let i=0; i<12; i++) {
                createDecoFlower();
            }
        }

        function createDecoFlower() {
            const div = document.createElement('div');
            div.className = 'deco-flower';
            div.innerHTML = '🌸'; // Basit çiçek ikonu
            div.style.left = Math.random() * 90 + 'vw';
            div.style.top = Math.random() * 90 + 'vh';
            div.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.getElementById('mainContent').appendChild(div);
            
            setTimeout(() => {
                div.style.opacity = '0.4';
                div.style.transform = `translateY(-${Math.random()*50}px) rotate(${Math.random()*360}deg)`;
            }, 100);
        }

        window.addEventListener('resize', initParticles);
    </script>
</body>
</html>
