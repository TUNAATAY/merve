<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Protocol: Pure_Heart</title>
    <style>
        /* HALVIOR OS - MINIMALIST RECOVERY ENGINE
           FIX: Alignment issues & Text removal
        */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #02050a; /* Zifiri Karanlık */
            background-image: radial-gradient(circle at center, #051622 0%, #02050a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Arka plan toz zerrecikleri */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .main-container {
            position: relative;
            z-index: 10;
            /* Bitki ve kalbi bir arada tutan merkez */
            width: 400px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.2));
            animation: plantSway 6s ease-in-out infinite;
        }

        /* --- BİTKİ (Cyan/Teal) --- */
        .stem {
            fill: none;
            stroke: #00f2ff;
            stroke-width: 3;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px #00f2ff);
        }

        .leaf {
            fill: rgba(0, 242, 255, 0.1);
            stroke: #00f2ff;
            stroke-width: 1.5;
            filter: drop-shadow(0 0 5px #00f2ff);
        }

        /* --- GEOMETRİK KALP (Neon Pink) --- */
        .heart-group {
            /* Kalbin tam merkezden büyümesi için transform-origin önemli */
            transform-origin: 200px 150px; 
            animation: heartPulse 1.5s ease-in-out infinite;
        }

        .heart-outline {
            fill: none;
            stroke: #ff007f;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 15px #ff007f);
        }

        /* Kalbin içindeki o "hardcore" mesh çizgileri */
        .heart-mesh {
            fill: none;
            stroke: rgba(255, 0, 127, 0.4);
            stroke-width: 1;
        }

        /* --- ANİMASYONLAR --- */
        @keyframes heartPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); filter: brightness(1.3); }
        }

        @keyframes plantSway {
            0%, 100% { transform: rotate(-1deg) translateX(0); }
            50% { transform: rotate(1deg) translateX(5px); }
        }

        /* Mouse Takip Işığı */
        .cursor {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>
    <canvas id="canvas"></canvas>

    <div class="main-container">
        <svg viewBox="0 0 400 600">
            
            <path d="M200,600 C190,450 210,350 200,150" class="stem" />
            
            <path d="M198,450 Q130,420 120,470 Q160,490 198,460" class="leaf" />
            <path d="M202,380 Q270,350 280,400 Q240,420 202,390" class="leaf" />
            <path d="M199,280 Q140,240 130,280 Q170,300 199,290" class="leaf" />

            <g class="heart-group">
                <path class="heart-outline" d="M200,150 C200,150 140,100 140,65 A30,30 0 0,1 200,40 A30,30 0 0,1 260,65 C260,100 200,150 200,150 Z" />
                <path class="heart-mesh" d="M200,150 L140,65 M200,150 L260,65 M200,40 L200,150 M140,65 L260,65" />
            </g>
        </svg>
    </div>

    <script>
        // Parçacık Sistemi (Toz Zerrecikleri)
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');

        let w, h, particles = [];

        function init() {
            resize();
            for(let i=0; i<50; i++) particles.push(new Particle());
            animate();
        }

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.5;
                this.opacity = Math.random();
            }
            update() {
                this.y -= this.speed;
                if(this.y < 0) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0,0,w,h);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        window.addEventListener('resize', resize);
        init();
    </script>
</body>
</html>
