<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merve_Recovery_v3 | Loading Protocol</title>
    <style>
        /* CSS Mimari - Zen/Relax Estetiği */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #02050a; /* Derin Mavi Karanlık */
            background-image: radial-gradient(circle at center, #051622 0%, #02050a 100%);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Arka Plan Toz Zerrecikleri (Bokeh) */
        .stars {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            z-index: 1;
        }

        /* Ana Sahne */
        .stage {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: containerSway 6s ease-in-out infinite;
        }

        /* Kompleks Vektörel Kalp ve Orbital Ring */
        .heart-complex-svg {
            width: 320px;
            height: 320px;
            overflow: visible;
        }

        /* Neon Pembe Hatlar */
        .heart-outline {
            fill: none;
            stroke: #ff007f;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 15px rgba(255, 0, 127, 0.6));
            transform-origin: 160px 160px;
            animation: heartbeatPulse 2s infinite ease-in-out;
        }

        /* Orbital Ring - Küçük Kalpler */
        .small-heart {
            fill: none;
            stroke: rgba(255, 0, 127, 0.3);
            stroke-width: 1;
            filter: drop-shadow(0 0 5px rgba(255, 0, 127, 0.5));
            animation: smallHeartFade 4s infinite ease-in-out;
        }

        /* Mesaj Alanı */
        .text-container {
            margin-top: 20px;
            text-align: center;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 5px;
            font-size: 1.4rem;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        p {
            font-weight: 200;
            font-size: 0.95rem;
            color: #8ab4f8;
            letter-spacing: 1px;
            font-style: italic;
        }

        /* Animasyonlar */
        @keyframes heartbeatPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.4); }
        }

        @keyframes containerSway {
            0%, 100% { transform: rotateY(-5deg) rotateX(2deg); }
            50% { transform: rotateY(5deg) rotateX(-2deg); }
        }

        @keyframes smallHeartFade {
            0%, 100% { stroke: rgba(255, 0, 127, 0.3); }
            50% { stroke: rgba(255, 0, 127, 0.7); filter: brightness(1.2); }
        }
    </style>
</head>
<body>

    <div class="stars" id="starField"></div>

    <div class="stage">
        <svg viewBox="0 0 320 320" class="heart-complex-svg">
            <path class="heart-outline" d="M160,260 L145,245 C105,205 85,185 85,155 A30,30 0 0,1 145,125 L160,145 L175,125 A30,30 0 0,1 235,155 C235,185 215,205 175,245 Z" />
            
            <g class="small-hearts-ring" transform="rotate(-90 160 160)">
                <path class="small-heart" d="M160,50 C160,50 148,42 148,35 A6,6 0 0,1 160,30 A6,6 0 0,1 172,35 C172,42 160,50 160,50 Z" />
                <path class="small-heart" d="M160,50 C160,50 148,42 148,35 A6,6 0 0,1 160,30 A6,6 0 0,1 172,35 C172,42 160,50 160,50 Z" transform="rotate(30 160 160)" />
                <path class="small-heart" d="M160,50 C160,50 148,42 148,35 A6,6 0 0,1 160,30 A6,6 0 0,1 172,35 C172,42 160,50 160,50 Z" transform="rotate(60 160 160)" />
                <path class="small-heart" d="M160,50 C160,50 148,42 148,35 A6,6 0 0,1 160,30 A6,6 0 0,1 172,35 C172,42 160,50 160,50 Z" transform="rotate(90 160 160)" />
                <path class="small-heart" d="M160,50 C160,50 148,42 148,35 A6,6 0 0,1 160,30 A6,6 0 0,1 172,35 C172,42 160,50 160,50 Z" transform="rotate(120 160 160)" />
                <path class="small-heart" d="M160,50 C160,50 148,42 148,35 A6,6 0 0,1 160,30 A6,6 0 0,1 172,35 C172,42 160,50 160,50 Z" transform="rotate(150 160 160)" />
                <path class="small-heart" d="M160,50 C160,50 148,42 148,35 A6,6 0 0,1 160,30 A6,6 0 0,1 172,35 C172,42 160,50 160,50 Z" transform="rotate(180 160 160)" />
                <path class="small-heart" d="M160,50 C160,50 148,42 148,35 A6,6 0 0,1 160,30 A6,6 0 0,1 172,35 C172,42 160,50 160,50 Z" transform="rotate(210 160 160)" />
                <path class="small-heart" d="M160,50 C160,50 148,42 148,35 A6,6 0 0,1 160,30 A6,6 0 0,1 172,35 C172,42 160,50 160,50 Z" transform="rotate(240 160 160)" />
                <path class="small-heart" d="M160,50 C160,50 148,42 148,35 A6,6 0 0,1 160,30 A6,6 0 0,1 172,35 C172,42 160,50 160,50 Z" transform="rotate(270 160 160)" />
                <path class="small-heart" d="M160,50 C160,50 148,42 148,35 A6,6 0 0,1 160,30 A6,6 0 0,1 172,35 C172,42 160,50 160,50 Z" transform="rotate(300 160 160)" />
                <path class="small-heart" d="M160,50 C160,50 148,42 148,35 A6,6 0 0,1 160,30 A6,6 0 0,1 172,35 C172,42 160,50 160,50 Z" transform="rotate(330 160 160)" />
            </g>
        </svg>

        <div class="text-container">
            <h1>YÜKLENİYOR...</h1>
            <p>[DÜZENLENECEK YAZI ALANI]</p>
        </div>
    </div>

    <script>
        // Arka plandaki toz zerrecikleri (Rastgele dağılım)
        const field = document.getElementById('starField');
        for (let i = 0; i < 60; i++) {
            let star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.background = 'rgba(0, 242, 255, 0.4)';
            star.style.borderRadius = '50%';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.opacity = Math.random();
            star.style.boxShadow = '0 0 5px rgba(0, 242, 255, 0.6)';
            field.appendChild(star);
        }
    </script>
</body>
</html>
