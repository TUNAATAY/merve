<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol: Merve_Recovery_v3</title>
    <style>
        /* HALVIOR OS - PROJECT: MERVE RECOVERY
           DESIGN SYSTEM: DARK BLUE / NEON ZEN
           ENGINE: PURE CSS & VANILLA JS
        */

        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&family=Syncopate:wght@400;700&display=swap');

        :root {
            --bg-dark: #02040a;
            --ocean-deep: #051622;
            --neon-blue: #00f2ff;
            --neon-glow: rgba(0, 242, 255, 0.4);
            --heart-magenta: #ff007f;
            --heart-glow: rgba(255, 0, 127, 0.5);
            --text-silver: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Arka Plan Gradient Katmanları */
        .bg-layers {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, var(--ocean-deep) 0%, var(--bg-dark) 100%);
            z-index: -1;
        }

        /* Parçacık Sistemi Tuvali */
        #particleCanvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            opacity: 0.6;
        }

        /* Ana Sahne Konteyneri */
        .master-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* --- SVG TASARIMI: PARLAYAN BİTKİ VE KALPLER --- */
        .svg-art-container {
            width: 400px;
            height: 450px;
            filter: drop-shadow(0 0 20px var(--neon-glow));
            transform-style: preserve-3d;
            animation: containerSway 8s ease-in-out infinite;
        }

        .flower-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* Bitki Sapı - Karmaşık Path */
        .stem-path {
            fill: none;
            stroke: var(--neon-blue);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawStem 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Yapraklar - Organik Formlar */
        .leaf {
            fill: rgba(0, 242, 255, 0.08);
            stroke: var(--neon-blue);
            stroke-width: 1;
            opacity: 0;
            animation: fadeIn 2s forwards 2s;
            transition: all 0.5s ease;
        }

        .leaf:hover {
            fill: var(--neon-blue);
            filter: brightness(1.5);
        }

        /* GEOMETRİK NEON KALP - v3 ARCHITECTURE */
        .heart-complex {
            transform-origin: center;
            animation: heartbeatPulse 2s infinite ease-in-out;
            cursor: pointer;
        }

        .heart-outline {
            fill: none;
            stroke: var(--heart-magenta);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 12px var(--heart-magenta));
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: drawHeart 4s forwards 1.5s;
        }

        .heart-mesh {
            fill: none;
            stroke: var(--heart-magenta);
            stroke-width: 0.5;
            opacity: 0.3;
            animation: meshFlicker 4s infinite 3s;
        }

        /* --- MESAJ VE UI ELEMANLARI --- */
        .ui-overlay {
            margin-top: 40px;
            text-align: center;
            opacity: 0;
            animation: uiFadeIn 4s forwards 3s;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border: 1px solid var(--neon-blue);
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 10px var(--neon-glow);
        }

        h1.main-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 8px;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        p.sub-message {
            font-weight: 300;
            font-size: 0.95rem;
            color: var(--text-silver);
            max-width: 400px;
            line-height: 1.6;
            font-style: italic;
        }

        /* --- ANIMASYON TANIMLAMALARI (KEYFRAMES) --- */
        @keyframes drawStem { to { stroke-dashoffset: 0; } }
        @keyframes drawHeart { to { stroke-dashoffset: 0; } }
        
        @keyframes heartbeatPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.6) drop-shadow(0 0 30px var(--heart-magenta)); }
        }

        @keyframes containerSway {
            0%, 100% { transform: rotateY(-5deg) rotateX(2deg); }
            50% { transform: rotateY(5deg) rotateX(-2deg); }
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes uiFadeIn { to { opacity: 1; transform: translateY(-10px); } }
        
        @keyframes meshFlicker {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.4; }
        }

        /* Mouse Takip Işığı */
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            transform: translate(-50%, -50%);
        }

    </style>
</head>
<body>

    <div class="bg-layers"></div>
    <div class="cursor-glow" id="glow"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="master-container">
        <div class="svg-art-container">
            <svg viewBox="0 0 400 500" class="flower-svg">
                <path d="M200,500 C180,400 220,350 200,250" class="stem-path" />
                
                <path d="M198,420 Q120,380 110,430 Q160,450 198,430" class="leaf" />
                <path d="M202,360 Q280,320 290,370 Q240,390 202,370" class="leaf" />
                <path d="M199,290 Q130,240 120,290 Q170,310 199,295" class="leaf" />

                <g class="heart-complex" transform="translate(100, 50)">
                    <path class="heart-outline" d="M100,160 L85,145 C45,105 25,85 25,55 A30,30 0 0,1 85,25 L100,45 L115,25 A30,30 0 0,1 175,55 C175,85 155,105 115,145 Z" />
                    <path class="heart-mesh" d="M100,160 L50,80 L100,45 L150,80 Z" />
                    <path class="heart-mesh" d="M100,160 L100,45 M25,55 L175,55" />
                </g>
            </svg>
        </div>

        <div class="ui-overlay">
            <div class="status-badge">Merve Recovery Protocol: Active</div>
            <h1 class="main-title">Mavinin Huzuru</h1>
            <p class="sub-message">"Soğuk çarptıysa biz de sistemi ısıtırız pampa. Şu an her şey yolunda, sadece dinlenmene bak."</p>
        </div>
    </div>

    <script>
        /* PARTICLE ENGINE v3.0
           Rastgele uçuşan toz zerrecikleri ve mouse etkileşimi
        */

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const glow = document.getElementById('glow');

        let particles = [];
        let width, height;

        function init() {
            resize();
            createParticles();
            animate();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = height + Math.random() * 100;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.life = Math.random() * 1000;
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                this.life--;

                if (this.y < -10 || this.life <= 0) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        function createParticles() {
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        // Mouse Takip Etkisi
        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        window.addEventListener('resize', resize);

        // Başlat
        init();

        console.log("Halvior OS: Merve Protocol Engine Loaded.");
    </script>
</body>
</html>
